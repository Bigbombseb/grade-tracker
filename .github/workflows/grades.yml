name: Check Grades
on:
  schedule:
    - cron: '0 * * * *'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Restore previous grades
        uses: actions/cache@v3
        with:
          path: last_grades.json
          key: last-grades-cache
          restore-keys: |
            last-grades-

      - name: Run grade checker
        env:
          COOKIE_STRING: ${{ secrets.COOKIE_STRING }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
        run: python grades.py

      - name: Save grades
        uses: actions/cache/save@v3
        with:
          path: last_grades.json
          key: last-grades-${{ github.run_id }}
