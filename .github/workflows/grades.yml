name: Check Grades
on:
  schedule:
    - cron: '0 * * * *'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install requests playwright python-dotenv
      - run: python -m playwright install chromium
      - run: python -m playwright install-deps chromium

      - name: Auto-refresh cookie
        env:
          SCHOOL_SUBDOMAIN: taboracademy
          SCHOOL_EMAIL: ${{ secrets.TABOR_EMAIL }}
          SCHOOL_PASS: ${{ secrets.TABOR_PASSWORD }}
          HEADLESS: "true"
          TIMEOUT: "30000"
        run: python auth.py

      - name: Run grade checker
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
        run: python grades.py

      - name: Save grades to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git pull --rebase
          git add last_grades.json
          git diff --staged --quiet || git commit -m "Update grades cache"
          git push
